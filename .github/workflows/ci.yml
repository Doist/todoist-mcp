name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Only a single workflow will run at a time. Cancel any in-progress run.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test-matrix:
        timeout-minutes: 60
        runs-on: ubicloud # `ubuntu-latest` is the official drop-in replacement

        strategy:
            fail-fast: false
            matrix:
                node-version: [24, 26]

        services:
            memcached:
                image: memcached:1.6-alpine
                ports:
                    - 11211:11211
                options: >-
                    --health-cmd "echo 'stats' | nc localhost 11211"

        env:
            MEMCACHED_HOST: localhost
            MEMCACHED_PORT: 11211

            NODE_ENV: test
            CI: true

        steps:
            - uses: actions/checkout@v5
              with:
                  lfs: true

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm run test

            - name: Run type checks
              run: npm run type-check

            - name: Run linting and formatting checks
              run: npm run format:check

            - name: Validate tool schemas
              run: npm run lint:schemas

            - name: Test MCP server executable
              run: npm run test:executable
              env:
                  TODOIST_API_KEY: fake-api-key-for-testing

    # Aggregate gate: reports a single stable `test` status regardless of the
    # node-version matrix, so branch protection can require one context that
    # doesn't change when the matrix does.
    test:
        needs: test-matrix
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Verify the test matrix succeeded
              run: |
                  if [ "${{ needs.test-matrix.result }}" != "success" ]; then
                      echo "test-matrix result: ${{ needs.test-matrix.result }}"
                      exit 1
                  fi
